name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Archive node_modules
        run: tar -czf node_modules.tgz node_modules

      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules.tgz
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node_modules

      - name: Extract dependencies
        run: tar -xzf node_modules.tgz

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node_modules

      - name: Extract dependencies
        run: tar -xzf node_modules.tgz

      - name: Run Jest
        run: npm test

  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node_modules

      - name: Extract dependencies
        run: tar -xzf node_modules.tgz

      - name: Run Prettier check
        run: npm run format:check

  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: setup
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: node_modules

      - name: Extract dependencies
        run: tar -xzf node_modules.tgz

      - name: Build
        run: npm run build

      - name: CDK synth
        run: npx cdk synth

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - format
      - cdk-synth
    steps:
      - run: echo "All CI checks passed"
